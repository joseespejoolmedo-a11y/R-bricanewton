<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Live TV Subtitles</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial, sans-serif; background:#000; color:#fff; }
    header { padding:14px 14px 10px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; border-bottom:1px solid #222; }
    button, select { font-size:16px; padding:10px 12px; border-radius:10px; border:1px solid #333; background:#111; color:#fff; }
    button.primary { background:#1b5cff; border-color:#1b5cff; }
    button.danger { background:#a30000; border-color:#a30000; }
    .pill { padding:6px 10px; border:1px solid #333; border-radius:999px; font-size:13px; opacity:0.9; }
    main { padding:14px; }
    #status { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    #subs { font-size: 32px; line-height: 1.2; }
    .line { margin: 0 0 14px; }
    .meta { font-size: 14px; opacity: 0.75; margin-top: 6px; }
    .controls { position: fixed; left:0; right:0; bottom:0; padding:12px 14px calc(12px + env(safe-area-inset-bottom)); background:rgba(0,0,0,0.92); border-top:1px solid #222; display:flex; gap:10px; flex-wrap:wrap; }
    .spacer { flex:1; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; opacity:0.7; }
  </style>
</head>
<body>
  <header>
    <button id="btnStart" class="primary">▶︎ Start</button>
    <button id="btnStop" class="danger" disabled>■ Stop</button>
    <span class="pill" id="modePill">Online (low latency)</span>
    <select id="latency">
      <option value="fast">Fast</option>
      <option value="balanced" selected>Balanced</option>
      <option value="accurate">Accurate</option>
    </select>
    <select id="labels">
      <option value="auto" selected>Speaker labels: Auto</option>
      <option value="off">Speaker labels: Off</option>
    </select>
    <span class="spacer"></span>
    <span class="mono" id="debug">idle</span>
  </header>

  <main>
    <div id="status">
      <span class="pill" id="conn">Disconnected</span>
      <span class="pill" id="net">—</span>
      <span class="pill" id="mic">Mic: off</span>
    </div>
    <div id="subs"></div>
    <div class="meta">
      Tip: Put your iPad near the TV speaker. Turn on “Mode TV” later (noise control) if we add it.
    </div>
  </main>

  <div class="controls">
    <button id="bMinus">A−</button>
    <button id="bPlus">A+</button>
    <button id="bClear">Clear</button>
    <button id="bSave">Save TXT</button>
  </div>

<script type="module">
const $ = (id) => document.getElementById(id);
const subsEl = $("subs");
const connPill = $("conn");
const netPill = $("net");
const micPill = $("mic");
const debugEl = $("debug");
const btnStart = $("btnStart");
const btnStop = $("btnStop");
const latencySel = $("latency");
const labelsSel = $("labels");

let pc, dc, stream;
let transcript = [];
let fontSize = 32;

function setDebug(s){ debugEl.textContent = s; }
function setConn(s, ok=false){ connPill.textContent = s; connPill.style.borderColor = ok ? "#2e7d32" : "#333"; }

function addLine({text, isFinal=false, lang=null, speaker=null}) {
  if (!text) return;
  const line = document.createElement("div");
  line.className = "line";
  const speakerLabel = (labelsSel.value === "off") ? "" : (speaker ? `${speaker}: ` : "");
  const langLabel = lang ? `(${lang}) ` : "";
  line.textContent = `${speakerLabel}${langLabel}${text}`;
  if (!isFinal) line.style.opacity = "0.75";
  subsEl.prepend(line);
  transcript.push(line.textContent);
  // Keep last ~40 lines
  while (subsEl.children.length > 40) subsEl.removeChild(subsEl.lastChild);
}

function updateNetworkPill(){
  const online = navigator.onLine;
  netPill.textContent = online ? "Online" : "Offline";
  netPill.style.borderColor = online ? "#2e7d32" : "#a30000";
}
window.addEventListener("online", updateNetworkPill);
window.addEventListener("offline", updateNetworkPill);
updateNetworkPill();

async function start() {
  try {
    setDebug("mic…");
    stream = await navigator.mediaDevices.getUserMedia({ audio: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true
    }});
    micPill.textContent = "Mic: on";
    micPill.style.borderColor = "#2e7d32";

    setDebug("webrtc…");
    pc = new RTCPeerConnection();
    stream.getTracks().forEach(t => pc.addTrack(t, stream));

    dc = pc.createDataChannel("oai-events");
    dc.onopen = () => {
      setDebug("dc open");
      // Configure transcription session via data channel.
      // We ask for multilingual transcription (language="") and fast turn detection.
      const tuning = latencySel.value;
      const td = (tuning === "fast") ? {type:"server_vad", threshold:0.5, prefix_padding_ms:150, silence_duration_ms:250}
               : (tuning === "accurate") ? {type:"server_vad", threshold:0.5, prefix_padding_ms:300, silence_duration_ms:650}
               : {type:"server_vad", threshold:0.5, prefix_padding_ms:250, silence_duration_ms:450};

      dc.send(JSON.stringify({
        type: "transcription_session.update",
        input_audio_format: "pcm16",
        input_audio_transcription: { model: "gpt-4o-transcribe", language: "" },
        turn_detection: td
      }));
    };
    dc.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        // We handle a few common event shapes. Not all events are documented here.
        // Look for partial / final transcript fields in event payloads.
        const t = msg?.transcript ?? msg?.text ?? msg?.delta?.text ?? null;
        const isFinal = msg?.type?.includes("final") || msg?.is_final || msg?.final || false;
        const lang = msg?.language || msg?.lang || null;
        // Speaker labeling is best-effort; if not present, we don't show it.
        const speaker = msg?.speaker ? `Speaker ${msg.speaker}` : null;
        if (t) addLine({text: t, isFinal, lang, speaker});
      } catch {}
    };

    pc.onconnectionstatechange = () => {
      setDebug(pc.connectionState);
      if (pc.connectionState === "connected") setConn("Connected", true);
      if (pc.connectionState === "failed" || pc.connectionState === "disconnected") setConn("Disconnected", false);
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    setDebug("handshake…");
    const r = await fetch("/session", {
      method: "POST",
      headers: { "Content-Type": "application/sdp" },
      body: offer.sdp
    });
    if (!r.ok) throw new Error("Server handshake failed");
    const answerSdp = await r.text();
    await pc.setRemoteDescription({ type: "answer", sdp: answerSdp });

    setConn("Connecting…", false);
    btnStart.disabled = true;
    btnStop.disabled = false;
  } catch (e) {
    console.error(e);
    alert("Could not start. Check mic permission and that the server is running.");
    stop();
  }
}

function stop() {
  try { dc?.close(); } catch {}
  try { pc?.close(); } catch {}
  pc = null; dc = null;
  try { stream?.getTracks()?.forEach(t => t.stop()); } catch {}
  stream = null;
  micPill.textContent = "Mic: off";
  micPill.style.borderColor = "#333";
  setConn("Disconnected", false);
  setDebug("idle");
  btnStart.disabled = false;
  btnStop.disabled = true;
}

btnStart.onclick = start;
btnStop.onclick = stop;

$("bPlus").onclick = () => { fontSize = Math.min(72, fontSize + 4); subsEl.style.fontSize = fontSize + "px"; };
$("bMinus").onclick = () => { fontSize = Math.max(18, fontSize - 4); subsEl.style.fontSize = fontSize + "px"; };
$("bClear").onclick = () => { subsEl.innerHTML = ""; transcript = []; };
$("bSave").onclick = () => {
  const blob = new Blob([transcript.slice().reverse().join("\n")], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "subtitles.txt";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
};

// PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
</script>
</body>
</html>
